version: '3.8'

services:
  clipgenius:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clipgenius
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - clipgenius-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  clipgenius-network:
    driver: bridge
